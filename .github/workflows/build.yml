name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          which xcodegen || brew install xcodegen

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: |
          xcrun simctl list devices available
          xcodebuild -showsdks

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          # Skip code signing
          xcodebuild -project QuickClip.xcodeproj -scheme QuickClip -configuration Debug -destination 'generic/platform=iOS Simulator' CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO ONLY_ACTIVE_ARCH=YES build
